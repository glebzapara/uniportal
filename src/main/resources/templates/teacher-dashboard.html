<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Teacher Groups</title>

    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
</head>

<body style="margin:0; padding:0;">

<nav style="background:#213d60; padding:12px 20px; border-bottom:2px solid #2562eb;">
    <table width="100%" cellpadding="0" cellspacing="0">
        <tr>
            <td align="left">
                <span style="font-size:26px; font-weight:700;
                    font-family:'Inter', sans-serif; color:white;">
                    Uni<span style="color:#2562eb;">Portal</span>
                </span>
            </td>

            <td align="right">
                <span style="display:inline-block;">
                    <a th:href="@{/}" style="color:white; text-decoration:none; margin:0 10px;">Home</a>

                    <a th:href="@{/schedule}" style="color:white; text-decoration:none; margin:0 10px;">Schedule</a>

                    <a th:href="@{/grades}" style="color:white; text-decoration:none; margin:0 10px;">Grades</a>

                    <a th:if="${currentStudent != null and currentStudent.role == 'ROLE_STUDENT'}"
                       th:href="@{/group}" style="color:white; text-decoration:none; margin:0 10px;">Group</a>

                    <a th:if="${currentStudent != null and currentStudent.role == 'ROLE_STUDENT'}"
                       th:href="@{/teachers}" style="color:white; text-decoration:none; margin:0 10px;">Teachers</a>

                    <a th:if="${currentTeacher != null and currentTeacher.role == 'ROLE_TEACHER'}"
                       th:href="@{/students}" style="color:white; text-decoration:none; margin:0 10px;">Students</a>

                    <span style="color:#888;">|</span>

                    <a th:if="${currentStudent != null}"
                       th:href="@{/students/{id}/profile(id=${currentStudent.id})}" style="color:#2562eb;
                        text-decoration:none; margin-left:10px;">Profile</a>

                    <a th:if="${currentTeacher != null}"
                       th:href="@{/teachers/{id}/profile(id=${currentTeacher.id})}" style="color:#2562eb;
                        text-decoration:none; margin-left:10px;">Profile</a>
                </span>
            </td>
        </tr>
    </table>
</nav>

<!-- IMAGES -->
<table width="100%" cellpadding="0" cellspacing="0">
    <tr>
        <td width="25%">
            <img src="/images/pang-yuhao-_kd5cxwZOK4-unsplash.jpg" style="display:block;" width="100%" height="330">
        </td>
        <td width="25%">
            <img src="/images/vadim-sherbakov-d6ebY-faOO0-unsplash.jpg" style="display:block;" width="100%" height="330">
        </td>
        <td width="25%">
            <img src="/images/darya-tryfanava-d55fhArDES0-unsplash.jpg" style="display:block;" width="100%" height="330">
        </td>
        <td width="25%">
            <img src="/images/leon-wu-LLfRMRT-9AY-unsplash.jpg" style="display:block;" width="100%" height="330">
        </td>
    </tr>
</table>

<!-- 🔥 FULL WIDTH BLUE BAR -->
<div style="
    width:100%;
    background:#3766a0;
    color:white;
    padding:12px 0;
    font-weight:700;
    text-align:center;
">
    Teacher Groups
</div>

<!-- CONTENT -->
<div style="
    max-width:1400px;
    margin:0 auto;
    display:grid;
    grid-template-columns:repeat(2, 1fr);
    gap:20px;
">

    <div th:each="g : ${groups}"
         style="border:1px solid #ccc; background:white; border-radius:10px;
                padding:18px 20px;
                display:flex; justify-content:space-between; align-items:center;">

        <div style="font-size:18px; font-weight:600;"
             th:text="${g.speciality}">
        </div>

        <a th:href="@{/subjects/{id}(id=${g.id})}"
           style="background:#3766a0; color:white; padding:8px 18px;
                  text-decoration:none; border-radius:6px; font-weight:600;">
            Open
        </a>

    </div>

        <!-- EMPTY -->
        <div th:if="${#lists.isEmpty(groups)}"
             style="text-align:center; color:#777; margin-top:20px;">
            No groups found
        </div>

    </div>

</div>

</body>
</html>
