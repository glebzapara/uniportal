<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <title>Profile</title>
</head>
<body>
<h1 th:text="${studentName}"></h1>
<h1 th:text="${studentSurname}"></h1>
<h1 th:text="${studentEmail}"></h1>
<h1 th:text="${studentFaculty}"></h1>
<h1 th:text="${studentCourse}"></h1>
<h1 th:text="${studentSpeciality}"></h1>
<h1 th:text="${studentCountry}"></h1>
<h1 th:text="${studentPhoneNumber}"></h1>
<img th:src="${studentImage}"/>
</body>
</html>
