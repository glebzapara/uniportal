<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Profile</title>

    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
</head>

<body style="margin:0; padding:0;">

<nav style="background:#213d60; padding:12px 20px; border-bottom:2px solid #2562eb;">
    <table width="100%" cellpadding="0" cellspacing="0">
        <tr>
            <td align="left">
                <span style="font-size:26px; font-weight:700; color:white;">
                    Uni<span style="color:#2562eb;">Portal</span>
                </span>
            </td>

            <td align="right">
                <span style="display:inline-block;">
                    <a th:href="@{/}" style="color:white; text-decoration:none; margin:0 10px;">Home</a>

                    <a th:href="@{/schedule}" style="color:white; text-decoration:none; margin:0 10px;">Schedule</a>

                    <a th:href="@{/grades}" style="color:white; text-decoration:none; margin:0 10px;">Grades</a>

                    <a th:if="${currentStudent != null and currentStudent.role == 'ROLE_STUDENT'}"
                        th:href="@{/group}" style="color:white; text-decoration:none; margin:0 10px;">Group</a>

                    <a th:if="${currentStudent != null and currentStudent.role == 'ROLE_STUDENT'}"
                        th:href="@{/teachers}" style="color:white; text-decoration:none; margin:0 10px;">Teachers</a>

                    <a th:if="${currentTeacher != null and currentTeacher.role == 'ROLE_TEACHER'}"
                        th:href="@{/students}" style="color:white; text-decoration:none; margin:0 10px;">Students</a>

                    <span style="color:#888;">|</span>

                    <a th:if="${currentStudent != null}"
                        th:href="@{/students/{id}/profile(id=${currentStudent.id})}" style="color:#2562eb;
                        text-decoration:none; margin-left:10px;">Profile</a>

                    <a th:if="${currentTeacher != null}"
                        th:href="@{/teachers/{id}/profile(id=${currentTeacher.id})}" style="color:#2562eb;
                        text-decoration:none; margin-left:10px;">Profile</a>
                </span>
            </td>
        </tr>
    </table>
</nav>

<div style="height:100vh; display:flex; justify-content:center;
    align-items:flex-start; background:#f2f5f9; padding-top:165px;">

    <div style="width:400px; border:1px solid #ccc; background:white; border-radius:10px; overflow:hidden;">

        <div style="background:#3766a0; color:white; padding:12px 20px; font-weight:700;">
            Profile
        </div>

        <div style="padding:25px; text-align:center;">

            <div style="width:90px; height:90px; background:#2f5fd1;
                color:white; border-radius:50%; display:flex; align-items:center;
                justify-content:center; font-size:32px; font-weight:700; margin:0 auto 15px auto;"
                th:text="${#strings.substring(teacher.name,0,1)}">
            </div>

            <div style="font-size:20px; font-weight:700;"
                th:text="${teacher.name + ' ' + teacher.surname}">
            </div>

            <div style="border-top:1px solid #eee; margin:15px 0;"></div>

            <div style="font-size:15px; line-height:1.8;">

                <div style="font-weight:550;">
                    <b style="color:#3766a0;">First name:</b>
                    <span th:text="${teacher.name}"></span>
                </div>

                <div style="font-weight:550;">
                    <b style="color:#3766a0;">Last name:</b>
                    <span th:text="${teacher.surname}"></span>
                </div>

                <div style="font-weight:550;">
                    <b style="color:#3766a0;">Email:</b>
                    <span th:text="${teacher.email}"></span>
                </div>

                <div style="font-weight:550;">
                    <b style="color:#3766a0;">Phone:</b>
                    <span th:text="${teacher.phoneNumber}"></span>
                </div>

            </div>

            <div style="margin-top:20px;">

                <form th:action="@{/logout}" method="post">
                    <button type="submit"
                            style="background:#e53935; color:white;
            border:none; padding:10px 25px;
            border-radius:6px; font-weight:600; cursor:pointer;">
                        Logout
                    </button>
                </form>

            </div>

        </div>

    </div>

</div>

</body>
</html>
