<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Subjects</title>
    <link rel="icon" type="image/svg+xml" href="/images/favicon.ico">
</head>

<body>

<h2>Subjects</h2>

<div th:each="s : ${subjects}">
    <p>
        <span th:text="${s.name}"></span>

        <a th:href="@{/subjects/{id}(id=${s.id})}">
            Open
        </a>
    </p>
</div>

</body>
</html>
