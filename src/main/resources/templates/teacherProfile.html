<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Profile</title>

    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
</head>

<body>

<nav style="background:#213d60; padding:12px 20px; border-bottom:2px solid #2562eb;">
    <table width="100%" cellpadding="0" cellspacing="0">
        <tr>
            <td align="left">
                <span style="font-size:26px; font-weight:700; color:white;">
                    Uni<span style="color:#2562eb;">Portal</span>
                </span>
            </td>
            <td align="right">
                <span style="display:inline-block;">
                    <a th:href="@{/}"
                        style="color:white; text-decoration:none; margin:0 10px;">
                        Home
                    </a>
                    <a th:href="@{/schedule}"
                        style="color:white; text-decoration:none; margin:0 10px;">
                        Schedule
                    </a>
                    <a th:href="@{/grades}"
                        style="color:white; text-decoration:none; margin:0 10px;">
                        Grades
                    </a>
                    <a th:if="${currentStudent != null and currentStudent.role == 'ROLE_STUDENT'}"
                        th:href="@{/group}"
                        style="color:white; text-decoration:none; margin:0 10px;">
                        Group
                    </a>
                    <a th:if="${currentStudent != null and currentStudent.role == 'ROLE_STUDENT'}"
                        th:href="@{/teachers}"
                        style="color:white; text-decoration:none; margin:0 10px;">
                        Teachers
                    </a>
                    <a th:if="${currentTeacher != null and currentTeacher.role == 'ROLE_TEACHER'}"
                        th:href="@{/students}"
                        style="color:white; text-decoration:none; margin:0 10px;">
                        Students
                    </a>
                    <span style="color:#888;">|</span>
                    <a th:if="${currentStudent != null}"
                        th:href="@{/students/{id}/profile(id=${currentStudent.id})}"
                        style="color:#2562eb; text-decoration:none; margin-left:10px;">
                        Profile
                    </a>
                    <a th:if="${currentTeacher != null}"
                        th:href="@{/teachers/{id}/profile(id=${currentTeacher.id})}"
                        style="color:#2562eb; text-decoration:none; margin-left:10px;">
                        Profile
                    </a>
                </span>
            </td>
        </tr>
    </table>
</nav>

<h1 th:text="${teacher.name}"></h1>
<h1 th:text="${teacher.surname}"></h1>
<h1 th:text="${teacher.email}"></h1>
<h1 th:text="${teacher.phoneNumber}"></h1>

<img th:src="${teacher.image}"/>

<form th:action="@{/logout}" method="post" style="margin-top: 16px;">
    <button type="submit">Logout</button>
</form>

</body>
</html>
