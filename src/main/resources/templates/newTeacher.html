<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>New Teacher</title>
</head>
<body>
<h2>Create New Teacher</h2>
<form th:action="@{/teachers}" th:object="${teacherForm}" method="post" enctype="multipart/form-data">
    <label for="name">Your name:</label>
    <input type="text" th:field="*{name}" id="name">

    <label for="surname">Your surname:</label>
    <input type="text" th:field="*{surname}" id="surname">

    <label for="email">Your email:</label>
    <input type="email" th:field="*{email}" id="email">

    <label for="password">Your password:</label>
    <input type="password" th:field="*{password}" id="password" max="25">

    <select name="departmentId">
        <option value="">-- Select department --</option>

        <option th:each="d : ${departments}"
                th:value="${d.id}"
                th:text="${d.name} + ' - ' + ${d.group.speciality}">
        </option>
    </select>

    <label for="phone_number">Your phone number:</label>
    <input type="tel" th:field="*{phoneNumber}" id="phone_number" pattern="\+?[0-9\s\-]{7,15}">

    <label for="image">Your image:</label>
    <input type="file" name="file" id="image">

    <button type="submit">Submit</button>
</form>
</body>
</html>
