<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>New Subject</title>
</head>

<body style="
    font-family:sans-serif;
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
">

<div style="transform: translateY(-68px); min-width:250px;">

    <h2>Create Subject</h2>

    <form th:action="@{/subjects}" th:object="${subjectForm}" method="post">
        <input type="hidden" th:field="*{id}">

        <label>Subject Name:</label><br>
        <input type="text" th:field="*{name}" style="width:100%;"><br><br>

        <label>Course:</label><br>
        <input type="number" th:field="*{course}" min="1" max="6" style="width:100%;"><br><br>

        <label>Department:</label><br>
        <select name="departmentId" style="width:100%;">
            <option value="">-- Select department --</option>
            <option th:each="d : ${departments}"
                    th:value="${d.id}"
                    th:text="${d.name}">
            </option>
        </select><br><br>

        <label>Description:</label><br>
        <div style="
            font-size:12px;
            color:#666;
            margin-bottom:6px;
            line-height:1.4;
        ">
            Use: <b>#LECTURES</b>, <b>#LABS</b>, <b>#RESOURCES</b> to split content
        </div>
        <textarea th:field="*{description}" style="width:100%; height:140px;"></textarea>

        <button type="submit">Save</button>
    </form>

</div>

</body>
</html>
